name: Dhruv GPT Forecasting CI

on:
  pull_request:
    paths:
      - "dhruv_GPT_forecasting/**"
      - ".github/workflows/dhruv-gpt-forecasting-ci.yml"
  push:
    branches:
      - main
    paths:
      - "dhruv_GPT_forecasting/**"
      - ".github/workflows/dhruv-gpt-forecasting-ci.yml"

permissions:
  contents: read

concurrency:
  group: dhruv-gpt-forecasting-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: dhruv_GPT_forecasting/pyproject.toml

      - name: Install package
        working-directory: dhruv_GPT_forecasting
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff
        working-directory: dhruv_GPT_forecasting
        run: python -m ruff check .

  test:
    name: Test (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: dhruv_GPT_forecasting/pyproject.toml

      - name: Install package
        working-directory: dhruv_GPT_forecasting
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run tests
        working-directory: dhruv_GPT_forecasting
        run: python -m pytest
