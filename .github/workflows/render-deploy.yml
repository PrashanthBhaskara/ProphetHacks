name: Render auto-deploy

# Pings Render's Deploy Hook on every push to main so the live
# https://prophet-hacks-forecast.onrender.com service rebuilds from
# the new HEAD. Long-form curl flags are used here because the secret
# URL happens to contain substrings like `-sS`, `-o`, `-w`, `-X`,
# which makes GitHub's secret-masking corrupt the actual command in
# weird ways; long flags avoid the collision.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
      - 'DEPLOY.md'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger Render deploy
        env:
          HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ "${HOOK_URL:-}" = "" ]; then
            echo "RENDER_DEPLOY_HOOK secret is not configured" >&2
            exit 1
          fi
          status=$(curl \
            --silent \
            --show-error \
            --request POST \
            --output /dev/null \
            --write-out "%{http_code}" \
            "$HOOK_URL")
          echo "Render Deploy Hook responded: HTTP $status"
          case "$status" in
            200|201|202)
              echo "Deploy queued."
              ;;
            *)
              echo "Unexpected HTTP $status from Render" >&2
              exit 1
              ;;
          esac
